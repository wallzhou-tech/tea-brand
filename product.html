<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>茶叶详情 - 茶韵 TEA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #F5F0E8; font-family: 'Noto Serif SC', serif; }
    .detail-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
    .breadcrumb { padding: 20px 0; font-size: 0.9rem; color: #888; }
    .breadcrumb a { color: #4A7C59; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; background: #fff; border-radius: 24px; padding: 50px; box-shadow: 0 4px 30px rgba(0,0,0,0.06); }
    @media(max-width: 768px) { .detail-grid { grid-template-columns: 1fr; padding: 30px; } }
    .detail-image { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f8f6f0, #f0ebe0); border-radius: 16px; min-height: 300px; position: relative; }
    .detail-placeholder { font-size: 5rem; }
    .detail-info h1 { font-size: 2rem; color: #333; margin-bottom: 5px; }
    .detail-en { color: #888; font-size: 1rem; margin-bottom: 25px; }
    .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .detail-tag { background: #f0ebe0; color: #666; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; }
    .detail-price-row { display: flex; align-items: baseline; gap: 15px; margin-bottom: 20px; }
    .detail-price { font-size: 2.5rem; font-weight: 700; color: #c0392b; }
    .detail-orig { font-size: 1.2rem; text-decoration: line-through; color: #999; }
    .detail-saving { background: #c0392b; color: #fff; padding: 4px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; }
    .detail-meta { border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; margin: 20px 0; }
    .detail-meta-item { display: flex; justify-content: space-between; font-size: 0.9rem; color: #666; padding: 5px 0; }
    .detail-desc { color: #555; line-height: 1.8; font-size: 0.95rem; margin-bottom: 25px; }
    .detail-ctas { display: flex; gap: 15px; flex-wrap: wrap; }
    .detail-buy-btn {
      flex: 1; background: linear-gradient(135deg, #c0392b, #e74c3c); color: #fff;
      text-align: center; padding: 16px; border-radius: 30px; font-size: 1.1rem;
      font-weight: 700; text-decoration: none; transition: all 0.3s;
    }
    .detail-buy-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(192,57,43,0.35); }
    .detail-consult-btn {
      background: transparent; border: 2px solid #4A7C59; color: #4A7C59;
      text-align: center; padding: 14px 24px; border-radius: 30px;
      font-size: 1rem; text-decoration: none; transition: all 0.3s;
    }
    .detail-consult-btn:hover { background: #4A7C59; color: #fff; }
    .detail-trust { display: flex; gap: 20px; margin-top: 20px; font-size: 0.8rem; color: #888; }
    .detail-section { margin-top: 40px; }
    .detail-section h2 { font-size: 1.3rem; color: #333; margin-bottom: 15px; border-left: 4px solid #4A7C59; padding-left: 12px; }
    .detail-specs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    .spec-item { background: #f8f6f0; padding: 15px; border-radius: 12px; }
    .spec-label { font-size: 0.75rem; color: #888; margin-bottom: 5px; }
    .spec-value { font-size: 0.95rem; color: #333; font-weight: 500; }
    .hot-badge-detail { position: absolute; top: 15px; left: 15px; background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; padding: 6px 14px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo"><span class="logo-cn">茶韵</span><span class="logo-en">TEA</span></a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="index.html" class="nav-link">首页</a></li>
          <li><a href="products.html" class="nav-link">代购好茶</a></li>
          <li><a href="index.html#agent" class="nav-link">代购服务</a></li>
          <li><a href="index.html#knowledge" class="nav-link">茶知识</a></li>
          <li><a href="index.html#contact" class="nav-link">联系</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="detail-container">
    <div class="breadcrumb">
      <a href="index.html">首页</a> / <a href="products.html">代购好茶</a> / <span id="breadcrumbName">加载中...</span>
    </div>

    <div class="detail-grid" id="detailContent">
      <!-- JS渲染 -->
    </div>

    <div class="detail-section" id="detailSections">
      <!-- JS渲染 -->
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2024 茶韵 TEA. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <script>
    const PRODUCTS = [
      {
        id:1, name:"西湖龙井 明前特级", name_en:"West Lake Longjing · Pre-Qingming Grade",
        price:"¥298", origPrice:"¥458", source:"京东自营旗舰店",
        sourceUrl:"https://item.jd.com/10120064393116.html",
        tags:["绿茶","明前茶","爆款"], hot:true, rating:4.9, sold:"5.6万", saving:"省¥160",
        desc:"西湖龙井产自杭州西湖区，以"色绿、香郁、味甘、形美"四绝著称。明前特级为春季最早采摘的嫩芽，茶叶细嫩饱满，香气清高，滋味鲜醇甘爽。本品来自京东自营旗舰店，正品保障。",
        specs:{产地:"杭州西湖",等级:"明前特级",工艺:"炒青绿茶",净重:"100g",保质期:"18个月",储存:"阴凉干燥"}
      },
      {
        id:2, name:"武夷正岩 大红袍", name_en:"Wuyi Da Hong Pao · Zhengyan",
        price:"¥528", origPrice:"¥698", source:"天猫旗舰店",
        sourceUrl:"https://www.jd.com/chanpin/2336705.html",
        tags:["乌龙茶","岩茶","爆款"], hot:true, rating:4.8, sold:"1.8万", saving:"省¥170",
        desc:"武夷山大红袍产自福建武夷山正岩产区，茶树生长于丹霞地貌的岩壁之间，得天独厚的环境赋予其独特的"岩骨花香"。干茶条索紧结，色泽绿褐润泽；汤色橙黄明亮，香气浓郁高长，滋味醇厚甘润，岩韵明显。",
        specs:{产地:"福建武夷山正岩",等级:"特级",工艺:"武夷岩茶(半发酵)",净重:"100g",保质期:"36个月",储存:"密封避光常温"}
      },
      {
        id:3, name:"云南古树 普洱熟茶", name_en:"Yunnan Ancient Tree Pu'er (Ripe)",
        price:"¥268", origPrice:"¥388", source:"淘宝",
        sourceUrl:"https://www.taobao.com/chanpin/6c47e04c240ceb919b1a94503fcbeb90.html",
        tags:["普洱","熟茶"], hot:false, rating:4.7, sold:"3.1万", saving:"省¥120",
        desc:"选用云南西双版纳古树茶菁，经传统渥堆发酵工艺精制而成。茶汤红浓透亮，陈香显著，滋味醇厚顺滑，入口甘甜。古树茶原料内含物质丰富，后期转化空间大。",
        specs:{产地:"云南西双版纳",等级:"古树一级",工艺:"普洱熟茶(后发酵)",净重:"357g",保质期:"越陈越香",储存:"通风干燥无异味"}
      },
      {
        id:4, name:"安溪铁观音 浓香型", name_en:"Anxi Tieguanyin · Strong Aroma",
        price:"¥128", origPrice:"¥228", source:"京东",
        sourceUrl:"https://www.jd.com/chanpin/106384.html",
        tags:["乌龙茶","铁观音","爆款"], hot:true, rating:4.6, sold:"5.6万", saving:"省¥100",
        desc:"安溪铁观音产自福建安溪县，是中国十大名茶之一。浓香型采用传统工艺重焙火，干茶色泽砂绿油润，汤色金黄明亮，花果香浓郁，滋味醇厚甘鲜，回甘明显。",
        specs:{产地:"福建安溪",等级:"浓香型一级",工艺:"闽南乌龙茶(半发酵)",净重:"250g",保质期:"36个月",储存:"密封常温避光"}
      },
      {
        id:5, name:"福鼎白茶 白毫银针", name_en:"Fuding White Silver Needle",
        price:"¥458", origPrice:"¥588", source:"天猫国际",
        sourceUrl:"https://www.tmall.com",
        tags:["白茶","银针"], hot:false, rating:4.9, sold:"1.2万", saving:"省¥130",
        desc:"福鼎白茶产自福建福鼎市，白毫银针为白茶极品，只采单芽，满披白毫，形如针状。成品茶汤呈浅杏黄色，清澈明亮，滋味鲜醇爽口，带有淡淡毫香。",
        specs:{产地:"福建福鼎",等级:"白毫银针特级",工艺:"白茶(微发酵)",净重:"50g",保质期:"15年以上",储存:"密封干燥常温"}
      },
      {
        id:6, name:"碧螺春 洞庭东山", name_en:"Bi Luo Chun · Dongting Dongshan",
        price:"¥258", origPrice:"¥368", source:"天猫旗舰店",
        sourceUrl:"https://www.taobao.com/chanpin/43d04caf0f9a6a48a0a643d758e46a9849df9c79e7eff8ce2d8ed89a235ce641.html",
        tags:["绿茶","碧螺春"], hot:false, rating:4.8, sold:"1.5万", saving:"省¥110",
        desc:"碧螺春产自苏州太湖洞庭东山，因产于果树下，茶吸果香，故具有独特的花果香气。成品条索纤细卷曲成螺，满身披毫，银绿隐翠。汤色嫩绿明亮，香气浓郁芬芳，滋味鲜醇回甘。",
        specs:{产地:"苏州太湖洞庭东山",等级:"一级",工艺:"炒青绿茶",净重:"100g",保质期:"18个月",储存:"阴凉干燥密封"}
      }
    ];

    // 获取URL参数
    const params = new URLSearchParams(window.location.search);
    const id = parseInt(params.get('id')) || 1;
    const productImages = {1:'/images/longjing.jpg',2:'/images/dahongpao.jpg',3:'/images/puer.jpg',4:'/images/tieguanyin.jpg',5:'/images/baimao.jpg',6:'/images/biluochun.jpg'};
    const product = PRODUCTS.find(p => p.id === id) || PRODUCTS[0];

    // 渲染详情
    document.getElementById('detailProductImg').src = productImages[id] || '/images/longjing.jpg';
    document.title = `${product.name} - 茶韵 TEA`;
    document.getElementById('breadcrumbName').textContent = product.name;

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-image">
        ${product.hot ? '<div class="hot-badge-detail">🔥 爆款</div>' : ''}
        <div class="detail-placeholder">${product.name.slice(0,2)}</div>
      </div>
      <div class="detail-info">
        <h1>${product.name}</h1>
        <p class="detail-en">${product.name_en}</p>
        <div class="detail-tags">
          ${product.tags.map(t => `<span class="detail-tag">${t}</span>`).join('')}
        </div>
        <div class="detail-price-row">
          <span class="detail-price">${product.price}</span>
          <span class="detail-orig">${product.origPrice}</span>
          <span class="detail-saving">${product.saving}</span>
        </div>
        <div class="detail-meta">
          <div class="detail-meta-item"><span>来源平台</span><span>${product.source}</span></div>
          <div class="detail-meta-item"><span>已售</span><span>${product.sold}</span></div>
          <div class="detail-meta-item"><span>评分</span><span>${product.rating}⭐</span></div>
        </div>
        <p class="detail-desc">${product.desc}</p>
        <div class="detail-ctas">
          <a href="${product.sourceUrl}" target="_blank" class="detail-buy-btn">立即代购 →</a>
          <a href="index.html#contact" class="detail-consult-btn">咨询客服</a>
        </div>
        <div class="detail-trust">
          <span>✅ 正品保障</span>
          <span>🚚 3-7天送达</span>
          <span>💰 假一赔十</span>
        </div>
      </div>
    `;

    document.getElementById('detailSections').innerHTML = `
      <div class="detail-section">
        <h2>📋 产品规格</h2>
        <div class="detail-specs">
          ${Object.entries(product.specs).map(([k,v]) => `<div class="spec-item"><div class="spec-label">${k}</div><div class="spec-value">${v}</div></div>`).join('')}
        </div>
      </div>
    `;
  </script>
</body>
</html>
